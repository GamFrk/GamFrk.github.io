<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>R6 Maps</title>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background-color: #0f1115;
			color: #e6e6e6;
		}

		header {
			background: #1f1f1f;
			padding: 20px;
			text-align: center;
			border-bottom: 1px solid #333;
		}

		header h1 { margin: 0; color: #fff; }

		nav { margin-top: 10px; }

		.nav-btn {
			display: inline-block;
			background: #4da6ff;
			color: #121212;
			padding: 10px 20px;
			margin: 10px;
			border-radius: 5px;
			text-decoration: none;
			font-weight: bold;
			transition: 0.3s;
		}

		.nav-btn:hover { background: #ff9800; }

		h2 {
			text-align: center;
			margin-top: 40px;
			color: #4da6ff;
		}

		.season {
			margin: 40px auto;
			max-width: 1200px;
			padding: 0 20px;
			position: relative;
		}

		.season:not(:last-child)::after {
			content: "";
			display: block;
			height: 1px;
			background: rgba(255,255,255,0.08);
			margin-top: 40px;
		}

		.content {
			display: flex;
			gap: 20px;
			flex-wrap: wrap;
			justify-content: center;
			margin-top: 15px;
		}

		.table-container { flex: 0 0 350px; }
		.chart-container { flex: 1 1 500px; min-height: 400px; }

		table {
			width: 100%;
			border-collapse: collapse;
			background: #1f2630;
		}

		th, td {
			padding: 10px;
			border: 1px solid #333;
		}

		th {
			background: #2a2f3a;
			color: #ff9800;
		}

		.total { font-weight: bold; background: #111827; }
	</style>
</head>

<body>

<header>
	<h1>R6 Maps & Ops</h1>
	<nav>
		<a class="nav-btn" href="r6home.html">Home</a>
		<a class="nav-btn" href="maps.html">Maps</a>
		<a class="nav-btn" href="operators.html">Operators</a>
	</nav>
</header>

<div id="app"></div>

<script>
const URL = "https://raw.githubusercontent.com/GamFrk/GamFrk.github.io/refs/heads/master/r6/maps.json";
const app = document.getElementById("app");

/* ---- helpers ---- */

const sortMaps = (maps) =>
	[...maps].sort((a, b) => (b.Count ?? 0) - (a.Count ?? 0));

const sum = (maps) =>
	maps.reduce((t, m) => t + (m.Count ?? 0), 0);

const buildTable = (maps, total) => `
	<table>
		<tr><th>Map</th><th>Count</th></tr>
		${maps.map(m => `
			<tr>
				<td>${m.Map}</td>
				<td>${m.Count ?? 0}</td>
			</tr>
		`).join("")}
		<tr class="total">
			<td>Total</td>
			<td>${total}</td>
		</tr>
	</table>
`;

const chartOptions = {
	indexAxis: "y",
	responsive: true,
	maintainAspectRatio: false,
	events: [],
	plugins: {
		legend: { display: false },
		tooltip: { enabled: false }
	},
	scales: {
		x: { ticks: { color: "#e6e6e6" }, grid: { color: "rgba(255,255,255,0.1)" } },
		y: { ticks: { color: "#e6e6e6" }, grid: { color: "rgba(255,255,255,0.1)" } }
	}
};

/* ---- main ---- */

fetch(URL)
	.then(r => r.json())
	.then(data => {
		Object.entries(data).forEach(([season, maps], i) => {

			const sorted = sortMaps(maps);
			const total = sum(sorted);

			const section = document.createElement("section");
			section.className = "season";

			section.innerHTML = `
				<h2>${season}</h2>
				<div class="content">
					<div class="table-container">
						${buildTable(sorted, total)}
					</div>
					<div class="chart-container">
						<canvas id="chart-${i}"></canvas>
					</div>
				</div>
			`;

			app.appendChild(section);

			new Chart(document.getElementById(`chart-${i}`), {
				type: "bar",
				data: {
					labels: sorted.map(m => m.Map),
					datasets: [{
						data: sorted.map(m => m.Count ?? 0),
						backgroundColor: "#ff9800"
					}]
				},
				options: chartOptions
			});
		});
	})
	.catch(console.error);
</script>

</body>
</html>
