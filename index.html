<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title></title>

		<style>
			body {
				margin: 0;
				font-family: Arial, sans-serif;
				background-color: #0f1115;
				color: #e6e6e6;
			}

			/* HEADER */
			header {
				background-color: #14171c;
				padding: 20px;
				text-align: center;
				border-bottom: 1px solid rgba(255, 255, 255, 0.06);
			}

			header h1 {
				margin: 0;
				color: #ffffff;
				font-size: 24px;
			}

			/* MAIN CONTENT */
			main {
				display: flex;
				align-items: center;
				justify-content: center;
				height: calc(100vh - 80px);
			}

			/* BUTTON */
			.r6-button {
				background: transparent;
				border: 2px solid #4da6ff;
				color: #e6e6e6;
				padding: 15px 30px;
				border-radius: 14px;
				cursor: pointer;
				font-size: 18px;
				font-weight: bold;
				letter-spacing: 1px;
				transition: 0.2s ease;
				text-decoration: none;
				display: inline-block;
			}

			.r6-button:hover {
				border-color: #ff9800;
				color: #ffffff;
				transform: scale(1.05);
			}
		</style>
	</head>

	<body>
		<header>
			<h1>github things</h1>
		</header>

		<main>
			<a href="https://gamfrk.github.io/r6/r6home.html" class="r6-button"> R6 Maps & Ops </a>
		</main>
	</body>
</html>
